name: Release Firmware

on:
  release:
    types: [created, published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Scan satelites/ to build a matrix of devices dynamically.
  # Each device is expected at: satelites/{NAME}/{NAME}-Satelite/CMakeLists.txt
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    env:
      TARGET_BRANCH: ${{ github.event.release.target_commitish || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Discover devices
        id: scan
        run: |
          devices=()
          while IFS= read -r cmake; do
            dir=$(dirname "$cmake")
            name=$(basename "$(dirname "$dir")")
            # Read target from sdkconfig.defaults; fall back to esp32
            target=$(grep -Po 'CONFIG_IDF_TARGET="\K[^"]+' "$dir/sdkconfig.defaults" 2>/dev/null \
                     || grep -Po 'CONFIG_IDF_TARGET="\K[^"]+' "$dir/sdkconfig" 2>/dev/null \
                     || echo "esp32")
            devices+=("{\"name\":\"$name\",\"path\":\"$dir\",\"target\":\"$target\"}")
          done < <(find satelites -mindepth 3 -maxdepth 3 -name "CMakeLists.txt")

          json=$(printf '%s\n' "${devices[@]}" | jq -s -c '.')
          echo "matrix={\"include\":$json}" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    env:
      TARGET_BRANCH: ${{ github.event.release.target_commitish || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Build ${{ matrix.name }} firmware
        uses: espressif/esp-idf-ci-action@v1.2.0
        with:
          esp_idf_version: v6.0.1
          target: ${{ matrix.target }}
          path: ${{ matrix.path }}
          command: idf.py build

      - name: Package flash bundle
        run: |
          VERSION="${{ github.event.release.tag_name || env.TARGET_BRANCH }}"
          NAME="${{ matrix.name }}-${VERSION}"
          BUILDDIR="${{ matrix.path }}/build"
          APP_BIN=$(find "$BUILDDIR" -maxdepth 1 -name "*.bin")
          mkdir dist
          cp "$APP_BIN"                                      "dist/${NAME}-app.bin"
          cp "$BUILDDIR/bootloader/bootloader.bin"           "dist/${NAME}-bootloader.bin"
          cp "$BUILDDIR/partition_table/partition-table.bin" "dist/${NAME}-partition-table.bin"
          cp "$BUILDDIR/flasher_args.json"                   "dist/${NAME}-flasher_args.json"
          (cd dist && zip "${NAME}-flash-bundle.zip" ./*.bin ./*.json)
      - name: Upload flash bundle to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          gh release upload "$VERSION" \
            "dist/${{ matrix.name }}-${VERSION}-flash-bundle.zip" \
            --clobber
